<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文化芸術分野の政策体系</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Digital Agency Design System — primitive Blue (official values) */
    --blue-50:#E8F1FE; --blue-100:#D9E6FF; --blue-200:#C5D7FB; --blue-300:#9DB7F9;
    --blue-500:#4979F5; --blue-600:#3460FB; --blue-700:#264AF4; --blue-800:#0031D8;
    --blue-900:#0017C1; --blue-1000:#00118F;
    /* neutrals (gray accessibility steps) */
    --gray-50:#F2F2F2; --gray-100:#E6E6E6; --border:#D9D9D9; --divider:#E8E8E8;
    --text:#1A1A1A; --text-sub:#4C4C4C; --text-faint:#767676;
    /* surfaces */
    --bg:#F4F6FB; --surface:#FFFFFF; --side:#FFFFFF;
    --primary:var(--blue-900); --link:var(--blue-900);
    --radius:12px; --radius-sm:8px;
    --elev:0 1px 2px rgba(20,30,60,.06), 0 4px 14px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Noto Sans JP",system-ui,sans-serif;line-height:1.75;
    -webkit-font-smoothing:antialiased;font-feature-settings:"palt" 1;}
  button{font:inherit;cursor:pointer;color:inherit;}
  :focus-visible{outline:3px solid var(--blue-700);outline-offset:2px;border-radius:4px;}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:70;background:var(--surface);
    border-bottom:1px solid var(--border);box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .topbar::before{content:"";display:block;height:4px;background:var(--blue-900);}
  .topbar .in{display:flex;align-items:center;gap:12px;padding:10px 18px;max-width:1340px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:9px;flex:none;font-weight:700;font-size:13px;color:var(--blue-900);}
  .brand .mk{width:20px;height:20px;border-radius:5px;background:var(--blue-900);display:inline-block;position:relative;flex:none;}
  .brand .mk::after{content:"";position:absolute;inset:5px;border:2px solid #fff;border-radius:2px;}
  .brand .sub{color:var(--text-faint);font-weight:500;}
  .hamb{display:none;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);
    padding:7px 9px;line-height:0;flex:none;color:var(--text-sub);}
  .crumb{display:flex;align-items:center;gap:3px;flex-wrap:wrap;font-size:12.5px;min-width:0;}
  .crumb button{border:0;background:none;color:var(--text-faint);padding:3px 6px;border-radius:6px;
    white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis;}
  .crumb button:hover{color:var(--blue-900);background:var(--blue-50);}
  .crumb button.cur{color:var(--text);font-weight:700;}
  .crumb .sep{color:var(--border);}

  /* ---------- layout ---------- */
  .layout{display:grid;grid-template-columns:300px 1fr;max-width:1340px;margin:0 auto;align-items:start;}
  .sidebar{position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;background:var(--side);
    border-right:1px solid var(--border);padding:14px 12px 40px;}
  .content{min-width:0;padding:28px 30px 80px;}

  /* ---------- explorer tree ---------- */
  .treetop{font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--text-faint);padding:6px 8px 12px;}
  .node{border:0;background:none;width:100%;text-align:left;display:flex;align-items:flex-start;gap:7px;
    padding:7px 8px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-sub);line-height:1.5;}
  .node:hover{background:var(--gray-50);}
  .node.cur{background:var(--blue-50);color:var(--blue-900);font-weight:700;
    box-shadow:inset 3px 0 0 var(--c,var(--blue-900));}
  .node .tw{flex:none;width:13px;text-align:center;color:var(--text-faint);font-size:9px;margin-top:4px;transition:transform .15s;}
  .node.open .tw{transform:rotate(90deg);}
  .node .dot{flex:none;width:9px;height:9px;border-radius:2px;background:var(--c,#bbb);margin-top:5px;}
  .node .lab{flex:1;min-width:0;}
  .node .lab small{display:block;font-size:11px;font-weight:400;color:var(--text-faint);}
  .children{margin-left:9px;border-left:1px solid var(--divider);padding-left:4px;}
  .node .ico{flex:none;width:15px;height:15px;margin-top:2px;color:var(--text-faint);}

  /* ---------- headings ---------- */
  .ttl{font-weight:700;line-height:1.4;letter-spacing:.01em;}
  .pill{display:inline-block;font-weight:700;font-size:13px;color:#fff;background:var(--gc);
    padding:4px 12px;border-radius:999px;}
  .ph{font-size:11.5px;letter-spacing:.08em;font-weight:700;color:var(--gc);margin-bottom:7px;}

  /* index cards */
  .lead{font-size:13.5px;color:var(--text-sub);margin:4px 0 22px;}
  .gcard{display:flex;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);
    box-shadow:var(--elev);overflow:hidden;margin-bottom:13px;width:100%;text-align:left;transition:.13s;}
  .gcard:hover{border-color:var(--gc);box-shadow:0 4px 18px rgba(20,30,60,.10);transform:translateY(-1px);}
  .gcard .stripe{width:6px;background:var(--gc);flex:none;}
  .gcard .body{padding:16px 18px;}
  .gcard .gidx{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--gc);}
  .gcard h2{font-size:19px;font-weight:700;margin:6px 0;letter-spacing:.01em;}
  .gcard .summ{font-size:12px;color:var(--text-faint);}

  /* option cards */
  .opts{display:grid;gap:11px;margin-top:18px;}
  .opt{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--border);background:var(--surface);
    border-radius:var(--radius);padding:15px 16px;text-align:left;width:100%;transition:.13s;box-shadow:var(--elev);}
  .opt:hover{border-color:var(--gc);background:var(--blue-50);transform:translateY(-1px);}
  .opt .badge{font-weight:700;font-size:15px;color:#fff;background:var(--gc);flex:none;
    min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);}
  .opt .ico{flex:none;color:var(--gc);margin-top:3px;}
  .opt .otxt{flex:1;min-width:0;}
  .opt .oname{font-size:15.5px;font-weight:700;}
  .opt .odesc{font-size:12.5px;color:var(--text-faint);margin-top:3px;font-weight:400;}
  .opt .arrow{color:var(--text-faint);flex:none;margin-top:4px;}

  .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 8px;
    border-radius:999px;margin-left:8px;vertical-align:middle;transform:translateY(-1px);}
  .tag.quant{background:var(--blue-50);color:var(--blue-900);}
  .tag.qual{background:#FFF1C2;color:#6E5200;}
  .tag.ref{background:var(--gray-50);color:var(--text-sub);}

  /* facet & indicator detail */
  .panel{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);box-shadow:var(--elev);
    padding:20px 22px;margin-top:18px;}
  .panel .ph{margin-bottom:10px;}
  .bodytext{font-size:14.5px;color:var(--text);}
  .means{display:flex;flex-wrap:wrap;gap:8px;}
  .means .m{font-size:13px;color:var(--text-sub);background:var(--gray-50);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:6px 11px;}
  .contrib{border-top:1px solid var(--divider);padding:16px 0;}
  .contrib:first-child{border-top:0;padding-top:2px;}
  .contrib p{margin:0 0 9px;font-size:14px;}
  .refrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .reflab{font-size:11px;font-weight:700;color:var(--text-faint);}
  .refchip{border:1.5px solid var(--gc);background:var(--surface);color:var(--gc);font-weight:700;font-size:13px;
    width:28px;height:28px;border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;transition:.13s;}
  .refchip:hover{background:var(--gc);color:#fff;}

  .goalbox{border-radius:var(--radius);background:var(--blue-50);border:1px solid var(--blue-100);
    border-left:5px solid var(--gc);padding:13px 16px;margin-top:6px;}
  .goalbox .gl{font-size:10.5px;font-weight:700;letter-spacing:.07em;color:var(--gc);}
  .goalbox .gv{font-size:14.5px;margin-top:3px;color:var(--text);}
  .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;}
  .tcell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;}
  .tcell.now{border-color:var(--gc);box-shadow:inset 0 2px 0 var(--gc);}
  .tcell .ty{font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--text-faint);margin-bottom:5px;
    display:flex;align-items:center;gap:5px;}
  .tcell .ty::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--gc);opacity:.45;}
  .tcell.now .ty{color:var(--gc);} .tcell.now .ty::before{opacity:1;}
  .tcell .tv{font-size:13.5px;line-height:1.55;word-break:break-word;}
  .tcell .tv.pending,.tcell .tv.none{color:var(--text-faint);}

  .siblbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
  .siblbar .sl{font-size:11px;font-weight:700;color:var(--text-faint);width:100%;margin-bottom:2px;letter-spacing:.05em;}
  .sibl{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:5px 13px;
    font-size:12.5px;color:var(--text-sub);transition:.13s;}
  .sibl:hover{border-color:var(--gc);color:var(--gc);background:var(--blue-50);}
  .sibl.cur{background:var(--gc);color:#fff;border-color:var(--gc);}

  .scrim{display:none;}
  @media(max-width:900px){
    .layout{grid-template-columns:1fr;}
    .hamb{display:block;}
    .brand .sub{display:none;}
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:286px;z-index:90;transform:translateX(-100%);
      transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.25);padding-top:18px;}
    body.treeopen .sidebar{transform:translateX(0);}
    body.treeopen .scrim{display:block;position:fixed;inset:0;background:rgba(15,20,40,.45);z-index:85;}
    .content{padding:22px 18px 70px;}
  }
  @media(max-width:520px){ .timeline{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<div class="topbar">
  <div class="in">
    <button class="hamb" id="hamb" aria-label="階層メニュー">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <span class="brand"><span class="mk"></span>文化芸術分野の政策体系<span class="sub">／ 測定指標ブラウザ</span></span>
    <nav class="crumb" id="crumb"></nav>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>
<div class="scrim" id="scrim"></div>

<script>
// 文化芸術分野の政策体系等（参考資料1-2）データ
// 出典: 文化庁 文化審議会 政策部会資料 94382401_06.pdf
// 構造: 政策目標 > 施策目標(NO) > 達成目標 / 達成手段 / 測定指標[]

const POLICY_GOALS = [
  { id: "g1", name: "文化芸術の振興", color: "#0017C1" },
  { id: "g2", name: "文化資源の保存と活用の一層の促進", color: "#00428C" },
  { id: "g3", name: "文化芸術を通じた次代を担う子供たちの育成", color: "#176C3A" },
  { id: "g4", name: "多様性を尊重した文化芸術の振興", color: "#5A2D8C" },
  { id: "g5", name: "文化芸術のグローバル展開の加速", color: "#B5000A" },
  { id: "g6", name: "文化芸術を通じた地方創生の推進", color: "#9A4F00" },
  { id: "g7", name: "デジタル技術を活用した文化芸術活動の推進", color: "#A01A6E" }
];

// type: "quant"(定量) / "qual"(定性評価) / "ref"(参考指標)
const DATA = [
  {
    goal: "g1", no: "1-1", measure: "ポストコロナの創造的な文化芸術活動の推進",
    target: "舞台芸術やメディア芸術などの分野において、文化芸術団体等の創造的な活動や文化芸術の担い手の確保・養成等を支援することで、優れた文化芸術活動が展開されて人々が文化芸術に深く触れ、楽しむようになるなど、文化芸術活動の活性化と、文化芸術水準の一層の向上を図る。",
    means: ["舞台芸術等総合支援事業（0447）", "日本映画の創造・振興プラン（0412）", "メディア芸術の創造・発信プラン（0413）", "クリエイター等育成・文化施設高付加価値化支援事業（新23-00522）"],
    indicators: [
      { no: "①", type: "quant", text: "人材育成事業で実施した研修に参加した芸術家等の人数（⑴舞台芸術 ⑵映画 ⑶メディア芸術）", src: "新進芸術家育成事業実績ほか（文化庁）", goalVal: "2023〜2027年の5年間累計で ⑴舞台芸術45,000名 ⑵映画290名 ⑶メディア芸術300名", pre: "⑴舞台2019年8,712名/2020年9,628人/2021年9,248人/2022年5,132名 ⑵映画2019年56名/2020年44人/2021年53人/2022年54名 ⑶メディア2019年29名/2020年63人/2021年62人/2022年35名", y23: "⑴8,968名 ⑵50名 ⑶65名", y24: "⑴9,953名 ⑵57名 ⑶69名", y25: "⑴2026年6月更新予定 ⑵64名（最大想定・4月末確定予定）⑶2026年3月末更新予定" },
      { no: "②", type: "quant", text: "若手クリエイター等の育成プロジェクトのうち、対象コンテンツが著名な芸術祭・文化施設で高い評価を獲得した件数", src: "クリエイター等育成・文化施設高付加価値化支援事業の実績", goalVal: "2024〜2026年度の累計で25件", pre: "ー（事業開始前）", y23: "ー（事業開始前）", y24: "ー（開始年度のため）", y25: "2027年4月末更新予定（暫定値は2026年4月末）" },
      { no: "③", type: "quant", text: "育成対象の若手クリエイター等について、(1)国内外の著名な賞の受賞・ノミネート、又は(2)世界的な芸術祭・文化施設等への出品・出演・参画で高評価を受けた件数", src: "同上", goalVal: "2024〜2028年度の累計で20件", pre: "ー（事業開始前）", y23: "ー（事業開始前）", y24: "ー（開始年度のため）", y25: "2029年3月末更新予定（暫定値は2026年4月末）" },
      { no: "④", type: "quant", text: "育成対象者を企画段階から登用・育成した結果、支援対象文化施設が国内外の賞の受賞・ノミネートや国内外の芸術祭等からの招へい・出品などの依頼を受けた件数", src: "同上", goalVal: "2024〜2028年度の累計で48件", pre: "ー（事業開始前）", y23: "ー（事業開始前）", y24: "ー（開始年度のため）", y25: "2029年3月末更新予定（暫定値は2026年4月末）" },
      { no: "⑤", type: "qual", text: "優れた文化芸術活動・人材育成の進展状況", src: "（定性評価の観点）", goalVal: "文化芸術団体等による創造的な活動が行われるとともに、次代を担う創造性豊かな芸術家等が育成される", pre: "—", y23: "—", y24: "—", y25: "—" },
      { no: "⑥", type: "quant", text: "国民の1年間の鑑賞活動への参加割合（⑴舞台芸術 ⑵映画）", src: "文化に関する世論調査（文化庁）", goalVal: "⑴舞台 2027年40.0% ⑵映画 2027年43.0%", pre: "⑴舞台2019年度37.4%/2022年度25.4% ⑵映画2019年度40.4%（メディアアート含）/2022年度30.7%", y23: "⑴23.3% ⑵21.9%", y24: "⑴21.5% ⑵19.5%", y25: "2026年4月末更新予定" },
      { no: "⑦", type: "quant", text: "国民の鑑賞以外の文化芸術活動への参加割合（メディア芸術）", src: "文化に関する世論調査（文化庁）", goalVal: "メディア芸術 2027年2.8%", pre: "2019年度2.3% / 2022年度1.6%", y23: "2.3%", y24: "3.0%", y25: "2026年4月末更新予定" },
      { no: "⑧", type: "ref", text: "ライブ・エンタテイメント市場規模", src: "ぴあ総研『ライブ・エンタテインメント白書』", goalVal: "参考指標につき目標値の設定なし", pre: "2019年6,295億円 / 2022年5,652億円", y23: "6,857億円", y24: "2025年12月末更新予定", y25: "2026年12月末更新予定" },
      { no: "⑨", type: "ref", text: "コンテンツ市場の成長率", src: "ヒューマンメディア「日本と世界のメディアコンテンツ市場データベース」", goalVal: "参考指標につき目標値の設定なし", pre: "2022年度 13.1兆円", y23: "14.4兆円", y24: "14.9兆円", y25: "2026年9月末更新予定" }
    ]
  },
  {
    goal: "g1", no: "1-2", measure: "活動基盤の強化・持続可能な発展",
    target: "団体・芸術家等における取引の適正化や就業環境の改善など活動基盤を強化することにより、芸術家等が創造性を豊かに発揮し、安心・安全に活動を継続できる環境の実現を目指す。また、文化芸術団体の自律的な運営や資金調達方法の多様化を促進することにより、我が国の文化芸術の持続可能な発展を図る。",
    means: ["文化芸術団体の自律的・持続的運営促進事業（021363）※令和6年度までは「文化芸術エコシステムの形成促進（0448）」", "芸術家等の活動基盤強化（0442）", "寄附税制の活用促進等"],
    indicators: [
      { no: "①", type: "quant", text: "「文化芸術団体の自律的・持続的運営促進事業」における団体の運営改善の実現（自己収入額の増加）", src: "対象団体への調査（文化庁）", goalVal: "2027年150%（2022年比での全団体の平均値）", pre: "2022年100%", y23: "約130%", y24: "約188%", y25: "2026年10月更新予定" },
      { no: "②", type: "quant", text: "事業環境改善を実感する芸術家等の割合", src: "芸術家等を対象とする独自アンケート調査（文化庁）", goalVal: "2027年50%", pre: "2021年20%", y23: "（2024年度より独自アンケート開始のため実績値無し）", y24: "28%", y25: "2026年6月末更新予定" },
      { no: "③", type: "qual", text: "取引の適正化や就業環境の改善など、芸術家等が安心・安全に活動できるための取組の進展状況", src: "（定性評価の観点）", goalVal: "芸術家等が安心・安全に活動できるための取組が進み、事業環境の改善につながっている", pre: "—", y23: "—", y24: "—", y25: "—" },
      { no: "④", type: "quant", text: "文化活動への寄付を行う国民の割合", src: "文化に関する世論調査（文化庁）", goalVal: "2025〜2027年度の平均6%", pre: "2020〜22年度の平均3.9%", y23: "2021〜2023年度の平均4.5%", y24: "2022〜2024年度の平均5.6%", y25: "2026年春更新予定" }
    ]
  },

    { text: "「文化芸術団体の自律的・持続的運営促進事業」では、事業運営コンサルティングや実証事業を実施することで支援事業の自律的運営の推進につながり、さらに支援事業のスキーム化の達成につながることで、我が国の文化芸術の持続可能な発展に資する。", refs:["①"] },
    { text: "「芸術家等の活動基盤強化」では、適正な契約関係構築の促進など活動基盤強化のための取組を推進することで芸術家等が文化芸術活動において個別の課題を解決したり適正な契約関係構築のための知識を習得したりすることにつながり、さらに芸術家等における事業環境改善の実感につながることで、芸術家等が創造性を豊かに発揮し、安心・安全に活動を継続できる環境の実現に資する。", refs:["②","③"] },
    { text: "寄附税制の活用促進等は、寄附に関する税制優遇措置等の周知等を実施することにより、寄附活動の増加につながり、国民の文化活動の充実や文化芸術の自律的・持続的な発展に貢献する。", refs:["④"] }
  ],
  "2-1": [
    { text: "「文化財保護対策の検討等」では、用具・原材料の生産者が行う管理業務や後継者育成、普及・啓発等を支援することで、広く文化財修理に必要不可欠な用具・原材料に対する興味関心を呼び起こしながら、文化財の保存・継承のための用具・原材料の確保に資する。", refs:["①"] },
    { text: "「国宝・重要文化財等の保存整備等」では、選定保存技術保持者・保存団体等が実施する研修等を支援することで、後継者の確保等技術継承の基盤が整備され、文化財の保存・継承のための修理技術者等の養成・確保に資する。", refs:["②"] },
    { text: "「国宝・重要文化財等の保存整備等」では、国指定等の有形の文化財（建造物、美術工芸品、民俗文化財等）の保存修理、防災施設の設置等に対して、また、無形の文化財（芸能、工芸技術、民俗芸能等）については伝承者養成や記録作成等に対しての国庫補助を実施することで、文化財の適切な保存活用に必要な修復等が実施され、文化財の保存と活用の好循環の構築に資する。", refs:["③"] },
    { text: "「文化財を活用した文化観光の推進による地方創生（国際観光旅客税財源）」のうち「全国各地の魅力的な文化財活用推進事業」では、国宝・特別史跡などの国指定等文化財について、文化財の本質的な魅力を引き出し、創意工夫に富んだ活用（特別な歴史体験、夜間活用、ユニークべニュー等）を図り、インバウンドの旺盛な知的好奇心を満たす高付加価値なコンテンツ造成を実施し、活用から保存への再投資を促進する。その際、文化庁や専門家が伴走支援を行いつつ、所有者等の意識改革や、文化財活用による収益創出と再投資の仕組みづくりのためのセミナー等を実施するなど、パッケージで取組を推進。", refs:["④"] }
  ],
  "2-2": [
    { text: "「国宝・重要文化財等の保存整備等」では、令和7年6月に閣議決定された「国土強靱化実施中期計画」も踏まえ、国指定等の有形の文化財（建造物、美術工芸品、民俗文化財等）の保存修理、防災施設の設置等に対して国庫補助を実施することで、文化財の防火・防災対策を充実することができ、火災や震災等による滅失・毀損の防止と人的安全性の確保が図られ、貴重な国民的財産である文化財の次世代への継承に資する。", refs:["①","②","③","④"] },
    { text: "「国宝・重要文化財等の保存整備等」では、重要伝統的建造物群保存地区、重要文化的景観地区の修理・修景、史跡名勝天然記念物の公開・活用整備等に係る整備に対して国庫補助を実施することで、これらの保存・活用が推進され、貴重な国民的財産である文化財の次世代への継承に資する。", refs:["⑤"] }
  ],
  "2-3": [
    { text: "「世界遺産普及活用・推薦のための事業推進」では、世界遺産委員会や国際専門家会合へ積極的に出席し情報収集、審査傾向の分析等を行うことで、世界遺産登録の推進及び登録後の保存管理に関する最新の動向や他国の類似資産の好事例等の習得につなげる。そのことが、我が国の推薦案件の確実な世界遺産登録に繋がるとともに、既登録遺産の持続可能な保存・活用の実現に資する。", refs:["①"] },
    { text: "「文化財の国際協力の推進」では、我が国がこれまで蓄積してきた文化遺産保存修復に係る高度な知識・技術・経験を活用し、海外の文化遺産保護の拠点となる機関との連携による保存修復事業を実施することで、相手国の専門家の育成や我が国の知見を生かした文化遺産国際協力の推進に繋がり、我が国の国際的地位の向上や人類共通の財産である世界各地の文化遺産の保護に貢献する。", refs:["③","④"] }
  ],
  "3-1": [
    { text: "「学校における文化芸術活動の推進等」及び「舞台芸術等総合支援事業」では、学校に文化芸術団体や芸術家を派遣して公演やワークショップを行うことで、子供たちが質の高い文化芸術の鑑賞・体験する機会を提供している。そのことで、子供たちの文化芸術への親しみが醸成され、豊かな人間性の涵養や、将来の芸術家や観客層の育成に資する。", refs:["①","②","③"] },
    { text: "「文化芸術教育の充実・改善に向けた検討会議」では、文化芸術教育の実態把握と、充実・改善に向けた施策の方向性を検討し、学校における文化芸術教育の充実を図ることで、子供たちが文化芸術に親しみ、豊かな人間性を涵養し、創造力と感性を育むことに資する。", refs:["①","②","③"] },
    { text: "「学校における文化芸術活動の推進等」では、部活動の地域移行等に向けた実証事業を実施することで、地域の実情に応じた取り組み事例を創出するとともに、その普及に努める。それにより、地域の実情に応じた地域連携・地域移行等に取り組む自治体が増え、子供たちが文化芸術に継続して親しむことのできる機会を確保する。", refs:["④"] },
    { text: "「劇場・音楽堂等における子供舞台芸術鑑賞体験支援事業」において、子供たちが本格的な実演芸術を鑑賞・体験する機会を提供する事で、実演芸術に親しむ環境づくりを推進する。そのことが、将来の文化芸術の担い手や観客となる子供の文化芸術鑑賞経験の向上につながり、子供の豊かな創造性や感性の育成に資する。", refs:["⑤"] },
    { text: "「伝統文化親子教室事業」では、伝統文化等に関する活動を行う団体等が子供たちに伝統文化等に関する活動を計画的・継続的に体験・修得できる体験機会を提供する取組に対して活動支援を行うことで、教室に参加した子供の伝統文化に対する意識が肯定的に変化することにつながり、さらに親子教室に参加した子供が継続的に伝統文化等に携わることで、子供たちの豊かな人間性の涵養や文化的な伝統を尊重する心の育成に資する。", refs:["⑤"] }
  ],
  "4-1": [
    { text: "「障害者による文化芸術活動の推進に関する法律」及び「文化芸術基本法」や、「障害者による文化芸術活動の推進に関する基本的な計画（第2期）」、「文化芸術推進基本計画（第2期）」に基づく施策を国として着実に推進するため、「障害者等による文化芸術活動推進事業」を実施し、文化芸術団体等が実施する障害者等による文化芸術の鑑賞や創造機会の拡大、発表機会の確保に係る先導的・試行的な取組を支援する。更には、支援人材の育成等に取り組むことで、先導的・試行的な取組の成果を基にした横断的な課題解決を図るなど、文化施設、文化芸術団体、地方自治体等における取組を促進する。これにより、共生社会の実現に向け、誰もが、あらゆる地域で文化芸術に親しみ、その豊かさを享受できる環境を形成する。", refs:["①","②","③"] }
  ],
  "4-2": [
    { text: "「国語施策の充実」において、文化審議会国語分科会で検討された表記等に関するよりどころについて、協議会やウェブサイト等で周知・普及することにより社会生活における言語コミュニケーションがより円滑に行われるようにし、「国語の表記に関する実態調査」及び「国語に関する意識調査」では実態・意識・理解の現状を調査して国語の改善に生かすとともに広く一般に知らせる。「消滅の危機にある言語・方言等に関する調査研究及び研究成果の還元」では保存・継承等の取組を実施し国民の興味・関心を喚起する。これらによって、社会全体として国語力の重要性を認識し、生涯を通じて国語力を身に付けていく状態を実現する。", refs:["①"] },
    { text: "「外国人等に対する日本語教育の推進」では、日本語教育機関の認定や日本語教員の登録等の認定制度の着実な実施を進めるほか、地域日本語教育の推進、日本語教室空白地域解消、特定ニーズに対応した日本語教育、教育カリキュラム編成・質向上支援、日本語教師の養成・研修、省庁連携基盤整備、調査研究等を通じた質の向上等を行い、我が国に居住する外国人が日常生活・社会生活を国民とともに円滑に営むことができる環境を実現する。", refs:["②","③"] }
  ],
  "5-1": [
    { text: "「クリエイター等育成・文化施設高付加価値化支援事業」では、次代を担うクリエイター等による作品や公演の企画・制作・交渉・発表・海外展開までの一体的な活動を通じた育成や、文化施設の次世代型の機能強化を支援する。これにより、活動機会が創出されるとともに、優れた文化芸術活動が国内外に展開され、文化芸術活動の活性化と芸術水準の向上が図られる。", refs:["①"] },
    { text: "「文化芸術のグローバル展開の推進」では、我が国アートのグローバル展開に資する事業や活字作品の海外展開への支援をすることで、我が国アートの国際的な露出・評価の増加及び文化芸術の国際発信強化につながり、さらに日本が文化芸術の発信拠点として国際的な地位を築くことにつながることで、我が国経済の活性化に資する。", refs:["②","③"] },
    { text: "「東アジア文化交流推進プロジェクト事業」・「国際文化交流・協力推進事業」では、様々な国と国際文化交流・協力事業を実施することで、我が国の文化芸術関係者のグローバル化につながり、さらに多様な国との文化交流につながることで、世界の多様な文化の理解・受容にも留意しつつ文化面での国際交流の充実を図り、我が国経済の活性化に資する。", refs:["④"] }
  ],
  "5-2": [
    { text: "「新進芸術家の海外研修」では、海外研修制度で採用された研修員に実践的な海外研修のための旅費を支援することで、将来的に国際舞台での活躍が期待される傑出した人材の海外研修実施件数増につながり、さらに国内外で活躍する我が国の著名な芸術家増につながることで、我が国の将来の文化芸術の振興を担う人材育成に資する。", refs:["①"] },
    { text: "「文化芸術のグローバル展開の推進」では、我が国アートのグローバル展開に資する事業や活字作品の海外展開への支援をすることで、我が国アートの国際的な露出・評価の増加及び国際発信強化につながり、さらに日本が文化芸術の発信拠点として国際的な地位を築くことにつながることで、我が国経済の活性化に資する。", refs:["②"] },
    { text: "「日本博を契機とした観光コンテンツの拡充」では、文化資源を磨き上げ、その魅力や強みを見える化することによって、参加した訪日外国人旅行者の満足度の向上につながる。それにより訪れるべき魅力あふれる目的地として認知され、参加者数の増加につながることで、観光需要の回復に資する。", refs:["③"] }
  ],
  "6-1": [
    { text: "国立美術館・博物館等において、運営費交付金や施設整備に必要な経費等を用い、中期目標及び中期計画・年度計画に基づいて文化財や標本・資料の調査・収集・保存・展示、または伝統芸能・現代舞台芸術の公演・研修・調査研究等の業務をおこなうことで、ナショナルコレクションの構築や多様な鑑賞機会の提供等を通じて、多くの入場（館）者が文化芸術等に親しみ、理解を深められるよう、ナショナルセンターである国立文化施設の機能強化等を推進する。", refs:["①","②","④"] },
    { text: "「アイヌ関連施策の推進」において、アイヌ語やアイヌ文化の保存・継承・交流を行うアイヌ文化振興等事業により、フェスティバル等への参加や興味関心の喚起につなげ、国立アイヌ民族博物館の運営を通して、訪れた方々に対してアイヌの歴史や地域のアイヌ文化の理解を促進し、道内各地域のアイヌ文化の復興・創造等に資する。", refs:["③"] },
    { text: "「近現代建築資料等の収集・保存」においては、国立近現代建築資料館を中核として、我が国の優れた近現代の建築資料の所在や現況を調査し収集・保管する。また、地方の博物館や関係機関等との連携を進め、建築資料のアーカイブズを構築することによって、優れた近現代建築資料の学術的・歴史的・芸術的価値の次世代への継承と国民の理解増進に資する。", refs:["③"] },
    { text: "「博物館機能強化推進事業」において、博物館資料のデジタル・アーカイブ化や館業務のDX、多様な主体と連携して社会的・地域的な課題への対応に先進的に取り組む事業を支援することで、ネットワーク形成による博物館機能の強化が進められ、来館者増加にもつながる。地域課題の解決や地域活力の向上に寄与し、地域の文化拠点としてのプレゼンス向上に繋がり地方創生を推進するとともに、関連分野で中核としての役割を果たす機能強化に資する。", refs:["③","④"] }
  ],
  "6-2": [
    { text: "「地域文化共創基盤の構築」では、地方公共団体による文化芸術創造拠点形成や地域を拠点にしたアーティストと地域住民等の協働への支援を一体的に実施しており、地域での文化芸術事業や公演等が増えることで参加者数が増加し、それが自主企画事業やアーティストの受け入れの増加につながる。それによって地域の特色ある文化芸術が振興され、居住する地域に関わらず質の高い芸術を鑑賞・参加・創造する環境が形成される。", refs:["①"] },
    { text: "「文化芸術創造都市の推進」では、セミナー等において創造都市施策に関心のある自治体職員等に対しネットワーク強化及び取組推進のためのノウハウや情報を提供することで、参加する自治体・団体の増加につながる。さらに参加数が増えることで優良事例が増加し、地域の文化的環境が向上する。", refs:["①"] },
    { text: "「現代的課題に対応した劇場・音楽堂等の総合的な機能強化の推進」の劇場・音楽堂等機能強化推進事業において、実演芸術の創造発信や専門人材の育成、普及啓発活動を支援することで、地域の劇場・音楽堂等の活性化と実演芸術の水準向上、有効なネットワーク形成を図る。これにより地域の住民が質の高い芸術文化活動に触れられる機会を創出することに資する。", refs:["②","④"] },
    { text: "「地域文化財総合活用推進事業」では、地域の文化財の総合的な保存活用に係る基本計画等作成支援を実施することで市町村における文化財保存活用地域計画の作成につながり、さらに認定地域計画を有する市町村が地域の特徴を示す文化財の把握を進め、地域社会全体で文化財を継承する計画・体制を構築することにつながることで、地域の文化振興体制の構築・強化の推進に資する。", refs:["③"] },
    { text: "「博物館機能強化の推進」における博物館に関する研修において、学芸員や館長・管理職等の多様な関係者に対して幅広い研修を行い、受講者等がノウハウの共有等を実施することで博物館の機能が強化される。地域課題の解決や地域活力の向上に寄与し、地域の文化拠点としてのプレゼンス向上に繋がり、我が国の地方創生に資する。", refs:["⑤"] }
  ],
  "6-3": [
    { text: "「文化拠点機能強化・文化観光推進プラン」では、文化観光推進法の計画認定事業者等から申請のあった事業に対して補助等により支援を行うことで、来訪者の満足度の向上、来訪者数の増加や地域内における経済波及に資する取組を促進し、文化観光の促進につながることで、文化拠点としての機能強化や地域における文化観光の総合的・一体的な推進を通じて「文化振興・観光振興・地域活性化」の好循環を創出する。", refs:["①"] },
    { text: "「地域文化財総合活用推進事業」及び「日本文化の魅力創出・発信」では、地域の課題や特性等を踏まえた日本遺産の魅力を増進する取組及び効果的な情報発信、文化財の魅力向上につながる一体的な整備等の支援を行うことで、来訪者数の増加や満足度の向上、地域内における経済波及に資する取組を促進し、さらには地域の活性化につなげることで「文化振興・観光振興・地域活性化」の好循環を創出する。", refs:["②"] },
    { text: "日本博を契機とした観光コンテンツの拡充では、文化資源を磨き上げ、その魅力や強みを見える化することによって、参加した訪日外国人旅行者の満足度の向上につながる。それにより訪れるべき魅力あふれる目的地として認知され、参加者数の増加につながることで、観光需要の回復に資する。", refs:["③"] }
  ],
  "6-4": [
    { text: "「『食文化あふれる国・日本』プロジェクト」では、地域の食文化の文化財登録等のために「食文化ストーリー」の構築等に対する支援や調査を行うことで、文化財登録された食文化数の増加や食文化の国民認知度の向上につなげることができ、食文化の継承に資する。", refs:["①"] },
    { text: "「『食文化あふれる国・日本』プロジェクト」では、「100年フード」等を通じた食文化のブランド化及び情報発信をすることで、食文化を用いた経済活動を行う自治体・団体等の増加等につなげることができ、経済活動等との好循環に資する。", refs:["②"] },
    { text: "「文化財保護対策の検討等」のうち生活文化調査研究事業により、生活文化に含まれ得る分野を特定するとともに各分野の現状や課題を把握し、調査結果に基づき保護策・振興策の検討を行う。具体的な保護策が必要な分野については無形文化財への登録等の保護施策の検討を行う。異なる文化芸術分野との連携による新たな魅力の創造や観光コンテンツの創出・発信等に係る取組を支援することで、生活文化の多様な価値と魅力が多くの国や世代に普及し、担い手団体や伝統産業等の活性化に資する。", refs:["③","④"] }
  ],
  "7-1": [
    { text: "文化芸術の鑑賞・体験機会が充実し、国民が文化芸術に触れる機会が増えることにより、これを未来に伝えるためデジタルアーカイブ化による保存・活用が促進される。「人材育成・収益化に向けた舞台芸術デジタルアーカイブ化推進支援事業」では舞台芸術作品のデジタルアーカイブ化を推進する。また「鑑賞・体験機会等充実のための事業推進」では、文化遺産オンラインの整備運営により、国指定文化財等の画像収集と公開、全国の所蔵館が管理するアーカイブの集積と公開、全国の博物館・美術館等におけるデジタルアーカイブの取組支援等を実施しており、誰もがいつでも文化芸術に関する情報に容易にアクセスできるようになる。国民が日本全国の文化芸術に身近に触れ、我が国の文化や歴史に対する理解を深める契機となり、文化芸術の継承や発展に資する。", refs:["①","②","④","⑥"] },
    { text: "「文化芸術エコシステムの形成促進」では、取り組むべき方策が明確になるとともに、具体的事例が創出され、それが横展開されることで、文化芸術分野における最先端のデジタル技術の活用が進展する。", refs:["③"] },
    { text: "国立博物館・美術館において、所蔵品等のデジタル・アーカイブ化を実施することにより、文化芸術の保存・活用の促進が図られる。", refs:["⑤"] },
    { text: "「博物館機能強化の推進」において、博物館資料のデジタル・アーカイブ化や館業務のDX等に取り組む事業を支援することにより、文化芸術の保存・活用の促進が図られる。", refs:["⑥"] }
  ],
  "7-2": [
    { text: "「著作権行政の充実」では、著作権紛争解決あっせん制度の運用、世界知的所有権機関（WIPO）分担金の拠出により、著作権紛争の迅速な解決、海賊版対策をはじめとした国内外での著作権制度の整備を行っている。そのことが、クリエイターへの適切な対価還元等につながり、「コンテンツ創作の好循環」の最大化に資する。", refs:["①"] },
    { text: "著作権法制度の検討および施策の運用では、文化審議会等における有識者による検討や、その方向性を踏まえた制度の改善・著作権法の適切な運用により、権利保護と利用円滑化のバランスをとった政策を推進している。特に令和8年度には、令和5年度著作権法改正により新たに創設することとされた未管理著作物裁定制度が施行される。これらの取組が、クリエイターの対価の創出や増加等につながり、「コンテンツ創作の好循環」の最大化に資する。", refs:["①","②"] },
    { text: "「著作権施策の推進」では、普及啓発、著作権侵害への対策取組により、国民の著作権に関する知識の定着、海賊版対策に関する他国との協働、著作権者の権利行使の実行につながる。そのことが、著作物の公正な利用、著作権者の権利保護の推進等につながり、「コンテンツ創作の好循環」の最大化に資する。", refs:["①","②","③"] }
  ]
};

</script>
<script>
(function(){
  "use strict";
  const goalMap = {}; POLICY_GOALS.forEach((g,i)=>{ g.idx=i+1; goalMap[g.id]=g; });
  const byGoal = {}; POLICY_GOALS.forEach(g=>byGoal[g.id]=[]);
  const groupByNo = {};
  DATA.forEach(gr=>{ byGoal[gr.goal].push(gr); groupByNo[gr.no]=gr; gr.contrib = CONTRIB[gr.no]||[]; });

  const FACETS = [
    {key:"target",     label:"達成目標",       desc:"この施策目標が目指す状態",       ico:"target"},
    {key:"means",      label:"達成手段",       desc:"目標達成のための事業（レビュー番号）", ico:"box"},
    {key:"contrib",    label:"貢献の仕組み",   desc:"達成手段が達成目標にどう貢献するか", ico:"flow"},
    {key:"indicators", label:"測定指標",       desc:"達成度を測る指標と目標値・実績値",   ico:"chart"}
  ];
  const facetLabel = k => (FACETS.find(f=>f.key===k)||{}).label || k;

  // svg icons
  const ICON = {
    target:'<svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>',
    box:'<svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>',
    flow:'<svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="7" height="5" rx="1"/><rect x="14" y="15" width="7" height="5" rx="1"/><path d="M6.5 9v4a2 2 0 0 0 2 2h6"/></svg>',
    chart:'<svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5M4 19h16M8 16v-4M12 16V8M16 16v-6"/></svg>'
  };
  const arrow='<svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>';

  const sidebar=document.getElementById("sidebar");
  const content=document.getElementById("content");
  const crumb=document.getElementById("crumb");
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function pendingClass(v){ if(!v||v==="—")return"none";
    if(/更新予定|データ無し|実績値無し|調査|開始前|開始年度|把握開始|実績確認予定|ランク外|^ー/.test(v))return"pending"; return""; }
  function shortGoal(n){ return n.replace("の一層の促進","").replace("の加速","").replace("の推進",""); }

  // ---------- state ----------
  let st={goal:null, group:null, facet:null, ind:null};
  function nav(s){
    st={goal:s.goal||null, group:s.group||null, facet:s.facet||null, ind:s.ind||null};
    document.body.classList.remove("treeopen");
    render();
    content.scrollIntoView?content.parentNode.scrollTo?0:0:0;
    window.scrollTo({top:0,behavior:"auto"});
  }

  // ---------- breadcrumb ----------
  function renderCrumb(){
    const parts=[{lab:"目次", go:{}}];
    if(st.goal){ const g=goalMap[st.goal]; parts.push({lab:g.idx+". "+shortGoal(g.name), go:{goal:g.id}}); }
    if(st.group){ const gr=groupByNo[st.group]; parts.push({lab:gr.no+" "+gr.measure, go:{goal:st.goal,group:gr.no}}); }
    if(st.facet){ parts.push({lab:facetLabel(st.facet), go:{goal:st.goal,group:st.group,facet:st.facet}}); }
    if(st.ind){ parts.push({lab:"指標 "+st.ind, go:{goal:st.goal,group:st.group,facet:"indicators",ind:st.ind}}); }
    crumb.innerHTML=parts.map((p,i)=>
      (i?'<span class="sep">›</span>':'')+
      '<button class="'+(i===parts.length-1?'cur':'')+'" data-i="'+i+'">'+esc(p.lab)+'</button>'
    ).join("");
    [...crumb.querySelectorAll("button")].forEach((b,i)=>b.addEventListener("click",()=>nav(parts[i].go)));
  }

  // ---------- sidebar tree ----------
  function node(opts){
    // opts: {level, label, sub, color, cur, open, hasTw, ico, onclick}
    const tw = opts.hasTw ? '<span class="tw">▶</span>' : '<span class="tw" style="opacity:0">▶</span>';
    const dot = opts.color!=null ? '<span class="dot" style="background:'+opts.color+'"></span>' : '';
    const ico = opts.ico ? opts.ico : '';
    const lab = '<span class="lab">'+esc(opts.label)+(opts.sub?'<small>'+esc(opts.sub)+'</small>':'')+'</span>';
    const b=document.createElement("button");
    b.className="node lvl-"+opts.level+(opts.cur?" cur":"")+(opts.open?" open":"");
    if(opts.color!=null) b.style.setProperty("--c",opts.color);
    b.innerHTML=tw+dot+ico+lab;
    b.addEventListener("click",opts.onclick);
    return b;
  }
  function renderTree(){
    sidebar.innerHTML='<div class="treetop">政策体系エクスプローラー</div>';
    const root=node({level:"root",label:"目次（政策目標 一覧）",hasTw:true,open:true,cur:!st.goal,
      onclick:()=>nav({})});
    sidebar.appendChild(root);
    const rootCh=document.createElement("div"); rootCh.className="children"; sidebar.appendChild(rootCh);

    POLICY_GOALS.forEach(g=>{
      const isCurGoal = st.goal===g.id;
      rootCh.appendChild(node({level:"goal",label:g.idx+". "+g.name,color:g.color,
        cur:isCurGoal&&!st.group, open:isCurGoal, hasTw:true,
        onclick:()=>nav({goal:g.id})}));
      if(!isCurGoal) return;
      const gch=document.createElement("div"); gch.className="children"; rootCh.appendChild(gch);
      byGoal[g.id].forEach(gr=>{
        const isCurGroup = st.group===gr.no;
        gch.appendChild(node({level:"group",label:gr.no+"　"+gr.measure,color:g.color,
          cur:isCurGroup&&!st.facet, open:isCurGroup, hasTw:true,
          onclick:()=>nav({goal:g.id,group:gr.no})}));
        if(!isCurGroup) return;
        const grch=document.createElement("div"); grch.className="children"; rootCh && gch.appendChild(grch);
        FACETS.forEach(f=>{
          const isCurFacet = st.facet===f.key;
          const cnt = f.key==="indicators" ? "（"+gr.indicators.length+"件）" : "";
          grch.appendChild(node({level:"facet",label:f.label+cnt,color:g.color,
            cur:isCurFacet&&!st.ind, open:isCurFacet&&f.key==="indicators",
            hasTw:f.key==="indicators",
            onclick:()=>nav({goal:g.id,group:gr.no,facet:f.key})}));
          if(f.key==="indicators" && isCurFacet){
            const fch=document.createElement("div"); fch.className="children"; grch.appendChild(fch);
            gr.indicators.forEach(ind=>{
              fch.appendChild(node({level:"ind",label:ind.no+"　"+ind.text.slice(0,22)+(ind.text.length>22?"…":""),
                color:g.color, cur:st.ind===ind.no,
                onclick:()=>nav({goal:g.id,group:gr.no,facet:"indicators",ind:ind.no})}));
            });
          }
        });
      });
    });
  }

  // ---------- content views ----------
  function render(){
    renderCrumb(); renderTree();
    if(!st.goal) return viewIndex();
    if(!st.group) return viewGoal();
    if(!st.facet) return viewGroup();
    if(st.facet==="indicators" && st.ind) return viewIndicator();
    return viewFacet();
  }

  function viewIndex(){
    let h='<div class="ph">政策体系</div><h1 class="ttl" style="font-size:26px;margin:0 0 6px">7つの政策目標</h1>'+
      '<p class="lead">政策目標を選ぶと、施策目標 → 達成目標／達成手段／貢献の仕組み／測定指標 と段階的に掘り下げられます。</p>';
    POLICY_GOALS.forEach(g=>{
      let ind=0; byGoal[g.id].forEach(gr=>ind+=gr.indicators.length);
      h+='<button class="gcard" style="--gc:'+g.color+'" data-g="'+g.id+'">'+
        '<span class="stripe"></span><span class="body">'+
        '<span class="gidx">政策目標 '+g.idx+'</span>'+
        '<h2>'+esc(g.name)+'</h2>'+
        '<span class="summ">施策目標 '+byGoal[g.id].length+'　／　測定指標 '+ind+'件</span>'+
        '</span></button>';
    });
    content.innerHTML=h;
    content.querySelectorAll(".gcard").forEach(b=>b.addEventListener("click",()=>nav({goal:b.dataset.g})));
  }

  function viewGoal(){
    const g=goalMap[st.goal];
    let h='<div style="--gc:'+g.color+'"><div class="ph">政策目標 '+g.idx+'</div>'+
      '<h1 class="ttl" style="font-size:25px;margin:0 0 4px;color:'+g.color+'">'+esc(g.name)+'</h1>'+
      '<p class="lead">施策目標を選んでください（'+byGoal[g.id].length+'件）。</p><div class="opts">';
    byGoal[g.id].forEach(gr=>{
      h+='<button class="opt" style="--gc:'+g.color+'" data-no="'+esc(gr.no)+'">'+
        '<span class="badge">'+esc(gr.no)+'</span>'+
        '<span class="otxt"><span class="oname">'+esc(gr.measure)+'</span>'+
        '<span class="odesc">測定指標 '+gr.indicators.length+'件　・　達成手段 '+gr.means.length+'件</span></span>'+
        arrow+'</button>';
    });
    h+='</div></div>';
    content.innerHTML=h;
    content.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>nav({goal:g.id,group:b.dataset.no})));
  }

  function siblingBar(){
    // sibling 施策目標 within the goal
    const g=goalMap[st.goal];
    let h='<div class="siblbar"><span class="sl">同じ政策目標の施策目標</span>';
    byGoal[g.id].forEach(gr=>{
      h+='<button class="sibl '+(gr.no===st.group?"cur":"")+'" style="--gc:'+g.color+'" data-no="'+esc(gr.no)+'">'+esc(gr.no)+'</button>';
    });
    h+='</div>';
    return h;
  }

  function viewGroup(){
    const g=goalMap[st.goal], gr=groupByNo[st.group];
    let h='<div style="--gc:'+g.color+'"><div class="ph">'+esc(g.name)+'</div>'+
      '<div class="pill">施策目標 '+esc(gr.no)+'</div>'+
      '<h1 class="ttl" style="font-size:23px;margin:11px 0 4px">'+esc(gr.measure)+'</h1>'+
      '<p class="lead">見たい情報を選んでください。</p><div class="opts">';
    FACETS.forEach(f=>{
      let desc=f.desc, extra="";
      if(f.key==="indicators") extra="（"+gr.indicators.length+"件）";
      if(f.key==="means") extra="（"+gr.means.length+"件）";
      if(f.key==="contrib") extra="（"+gr.contrib.length+"件）";
      h+='<button class="opt" style="--gc:'+g.color+'" data-f="'+f.key+'">'+
        ICON[f.ico]+
        '<span class="otxt"><span class="oname">'+esc(f.label)+esc(extra)+'</span>'+
        '<span class="odesc">'+esc(desc)+'</span></span>'+arrow+'</button>';
    });
    h+='</div>'+siblingBar()+'</div>';
    content.innerHTML=h;
    content.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>nav({goal:g.id,group:gr.no,facet:b.dataset.f})));
    bindSibl();
  }

  function viewFacet(){
    const g=goalMap[st.goal], gr=groupByNo[st.group], f=st.facet;
    let inner="";
    if(f==="target"){
      inner='<div class="panel"><div class="ph">達成目標</div><div class="bodytext">'+esc(gr.target)+'</div></div>';
    } else if(f==="means"){
      inner='<div class="panel"><div class="ph">達成手段（レビュー番号）</div><div class="means">'+
        gr.means.map(m=>'<span class="m">'+esc(m)+'</span>').join("")+'</div></div>';
    } else if(f==="contrib"){
      inner='<div class="panel"><div class="ph">達成手段が達成目標の達成にどのように貢献するか</div>'+
        gr.contrib.map(c=>'<div class="contrib"><p>'+esc(c.text)+'</p>'+
          '<div class="refrow"><span class="reflab">関連する測定指標</span>'+
          c.refs.map(r=>'<button class="refchip" data-r="'+esc(r)+'">'+esc(r)+'</button>').join("")+
          '</div></div>').join("")+'</div>';
    } else if(f==="indicators"){
      inner='<div class="ph">測定指標（'+gr.indicators.length+'件）</div>'+
        '<p class="lead">指標を選ぶと目標値・実績値の推移を表示します。</p><div class="opts">'+
        gr.indicators.map(ind=>{
          const t=ind.type==="qual"?'<span class="tag qual">定性評価</span>':ind.type==="ref"?'<span class="tag ref">参考指標</span>':'<span class="tag quant">定量</span>';
          return '<button class="opt" style="--gc:'+g.color+'" data-ind="'+esc(ind.no)+'">'+
            '<span class="badge">'+esc(ind.no)+'</span>'+
            '<span class="otxt"><span class="oname">'+esc(ind.text)+t+'</span>'+
            '<span class="odesc">出典：'+esc(ind.src)+'</span></span>'+arrow+'</button>';
        }).join("")+'</div>';
    }
    content.innerHTML='<div style="--gc:'+g.color+'"><div class="ph">'+esc(gr.no)+'　'+esc(gr.measure)+'</div>'+
      '<h1 class="ttl" style="font-size:22px;margin:6px 0 2px;color:'+g.color+'">'+esc(facetLabel(f))+'</h1>'+
      inner+ facetSibBar() +'</div>';

    // bindings
    if(f==="contrib"){
      content.querySelectorAll(".refchip").forEach(b=>b.addEventListener("click",()=>
        nav({goal:g.id,group:gr.no,facet:"indicators",ind:b.dataset.r})));
    }
    if(f==="indicators"){
      content.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>
        nav({goal:g.id,group:gr.no,facet:"indicators",ind:b.dataset.ind})));
    }
    bindFacetSib();
  }

  function facetSibBar(){
    const g=goalMap[st.goal], gr=groupByNo[st.group];
    let h='<div class="siblbar"><span class="sl">この施策目標の中で移動</span>';
    FACETS.forEach(f=>{ h+='<button class="sibl '+(f.key===st.facet?"cur":"")+'" style="--gc:'+g.color+'" data-f="'+f.key+'">'+esc(f.label)+'</button>'; });
    h+='</div>';
    return h;
  }
  function bindFacetSib(){
    const g=goalMap[st.goal], gr=groupByNo[st.group];
    content.querySelectorAll(".sibl").forEach(b=>b.addEventListener("click",()=>nav({goal:g.id,group:gr.no,facet:b.dataset.f})));
  }
  function bindSibl(){
    const g=goalMap[st.goal];
    content.querySelectorAll(".sibl").forEach(b=>b.addEventListener("click",()=>nav({goal:g.id,group:b.dataset.no})));
  }

  function viewIndicator(){
    const g=goalMap[st.goal], gr=groupByNo[st.group];
    const ind=gr.indicators.find(i=>i.no===st.ind)||gr.indicators[0];
    const t=ind.type==="qual"?'<span class="tag qual">定性評価</span>':ind.type==="ref"?'<span class="tag ref">参考指標</span>':'<span class="tag quant">定量</span>';
    const cells=[{y:"策定時以前",v:ind.pre},{y:"2023年",v:ind.y23},{y:"2024年",v:ind.y24},{y:"2025年",v:ind.y25,now:true}]
      .map(c=>'<div class="tcell'+(c.now?" now":"")+'"><div class="ty">'+c.y+'</div><div class="tv '+pendingClass(c.v)+'">'+esc(c.v||"—")+'</div></div>').join("");
    // related means (reverse from contrib refs)
    const related=gr.contrib.filter(c=>c.refs.indexOf(ind.no)!==-1);
    let relHtml="";
    if(related.length){
      relHtml='<div class="panel"><div class="ph">この指標に貢献する達成手段</div>'+
        related.map(c=>'<div class="contrib"><p>'+esc(c.text)+'</p></div>').join("")+'</div>';
    }
    content.innerHTML='<div style="--gc:'+g.color+'"><div class="ph">'+esc(gr.no)+'　'+esc(gr.measure)+' ・ 測定指標</div>'+
      '<div style="display:flex;gap:11px;align-items:flex-start;margin-top:6px">'+
        '<span class="pill" style="font-size:17px">'+esc(ind.no)+'</span>'+
        '<h1 class="ttl" style="font-size:20px;margin:2px 0">'+esc(ind.text)+t+'</h1></div>'+
      '<div class="panel" style="padding:15px 18px"><div class="ph">出典（調査等）</div><div class="bodytext" style="font-size:13.5px">'+esc(ind.src)+'</div></div>'+
      '<div class="goalbox"><div class="gl">'+(ind.type==="quant"?'目標値・目標水準':'目標とする状態')+'</div><div class="gv">'+esc(ind.goalVal)+'</div></div>'+
      '<div class="ph" style="margin-top:20px">実績値の推移</div><div class="timeline">'+cells+'</div>'+
      relHtml+
      indSibBar()+'</div>';
    content.querySelectorAll(".sibl").forEach(b=>b.addEventListener("click",()=>nav({goal:g.id,group:gr.no,facet:"indicators",ind:b.dataset.ind})));
  }
  function indSibBar(){
    const g=goalMap[st.goal], gr=groupByNo[st.group];
    let h='<div class="siblbar"><span class="sl">同じ施策目標の測定指標</span>';
    gr.indicators.forEach(i=>{ h+='<button class="sibl '+(i.no===st.ind?"cur":"")+'" style="--gc:'+g.color+'" data-ind="'+esc(i.no)+'">'+esc(i.no)+'</button>'; });
    h+='</div>';
    return h;
  }

  // ---------- mobile drawer ----------
  document.getElementById("hamb").addEventListener("click",()=>document.body.classList.toggle("treeopen"));
  document.getElementById("scrim").addEventListener("click",()=>document.body.classList.remove("treeopen"));

  render();
})();

</script>
</body>
</html>
